server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large request bodies (file uploads)
    client_max_body_size 50m;

    # API proxy — handles normal requests, LDAP sync, and SSE streaming
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeouts for LDAP sync and AI responses
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        # SSE (Server-Sent Events) support for streaming AI responses
        # These settings are critical — without them, nginx buffers
        # the entire response and the frontend sees no tokens until completion.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;

        # HTTP/1.1 + WebSocket upgrade support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Disable chunked transfer encoding manipulation
        chunked_transfer_encoding on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
