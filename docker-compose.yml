services:
  mysql:
    image: mysql:8.0
    container_name: deliverydesk-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: deliverydesk
      MYSQL_USER: deliverydesk
      MYSQL_PASSWORD: deliverydesk123
    # MySQL port is NOT exposed to the host to avoid port conflicts.
    # Only the backend container needs to access MySQL via the internal network.
    # Uncomment the next 2 lines if you need direct host access for debugging:
    # ports:
    #   - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - deliverydesk-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: deliverydesk-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    # RabbitMQ ports are NOT exposed to the host to avoid port conflicts.
    # Only the backend container needs access via the internal network.
    # Uncomment for debugging:
    # ports:
    #   - "127.0.0.1:5672:5672"
    #   - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - deliverydesk-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deliverydesk-backend
    restart: unless-stopped
    # Backend port is NOT exposed to the host — nginx proxies /api/ requests.
    # Uncomment for debugging:
    # ports:
    #   - "127.0.0.1:8080:8080"
    environment:
      SERVER_PORT: "8080"
      GIN_MODE: release
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: deliverydesk
      DB_PASSWORD: deliverydesk123
      DB_NAME: deliverydesk
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_MODEL: ${AI_MODEL:-gpt-4}
      JWT_SECRET: ${JWT_SECRET:-deliverydesk-secret-key-2024}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - deliverydesk-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deliverydesk-frontend
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
    depends_on:
      - backend
    networks:
      - deliverydesk-net

networks:
  deliverydesk-net:
    driver: bridge
    # Disable IPv6 to prevent "link is not ready" errors that can
    # disrupt the host network and cause the VM to become unreachable.
    enable_ipv6: false
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

volumes:
  mysql_data:
  rabbitmq_data:
